apiVersion: gateway.networking.k8s.io/v1beta1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: eg-hostnet
    namespace: envoy-gateway-system
---
# 1) hostNetwork + port bind のための EnvoyProxy（DaemonSet化して hostNetwork をpatchで付与）
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eg-hostnet
  namespace: envoy-gateway-system
spec:
  extraArgs:
  - --use-dynamic-base-id
  provider:
    type: Kubernetes
    kubernetes:
      useListenerPortAsContainerPort: true
      envoyDaemonSet:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
                  containers:
                  - name: envoy
                    securityContext:
                      allowPrivilegeEscalation: false
                      privileged: false
                      runAsUser: 0
                      runAsGroup: 0
                      runAsNonRoot: false
                      capabilities:
                        drop: ["ALL"]
                        add: ["NET_BIND_SERVICE"]
      envoyService:
        type: ClusterIP